<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Security Agent — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080b10;
    --surface: #0d1117;
    --border:  #1c2333;
    --muted:   #3d4a5c;
    --text:    #c9d1d9;
    --bright:  #e6edf3;
    --red:     #ff4d4d;
    --blue:    #58a6ff;
    --green:   #3fb950;
    --mono:    'Space Mono', monospace;
    --sans:    'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* scanline */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px;
    width: 100%;
    max-width: 400px;
    position: relative;
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--red);
    border-radius: 12px 12px 0 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--red);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    animation: pulse 3s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .logo-text h1 {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--bright);
  }

  .logo-text span {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    display: block;
    margin-top: 3px;
  }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--bright);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.1em;
  }

  input[type="password"]:focus {
    border-color: var(--blue);
  }

  button {
    width: 100%;
    margin-top: 20px;
    background: var(--blue);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.85; }

  .error {
    margin-top: 16px;
    background: rgba(255,77,77,0.1);
    border: 1px solid rgba(255,77,77,0.3);
    color: var(--red);
    font-family: var(--mono);
    font-size: 11px;
    padding: 10px 14px;
    border-radius: 6px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">
      <h1>Cloud Security Agent</h1>
      <span>Enter your password to continue</span>
    </div>
  </div>

  <form method="POST" action="/login">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus placeholder="••••••••••••">
    <button type="submit">Unlock Dashboard →</button>
  </form>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
</div>

</body>
</html>
