# accounts.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Registry of AWS accounts scanned by the Cloud Security Agent.
#
# Auth methods (pick one per account):
#   profile:   uses a named AWS CLI profile from ~/.aws/credentials
#   role_arn:  assumes a cross-account IAM role via STS (recommended for prod)
#
# Add as many accounts as needed.
# ─────────────────────────────────────────────────────────────────────────────

accounts:
  - id: "024863982143"
    name: production
    region: us-east-1
    profile: default          # AWS CLI profile name

  # Example: cross-account via role assumption
  # - id: "111122223333"
  #   name: staging
  #   region: us-east-1
  #   role_arn: arn:aws:iam::111122223333:role/SecurityAuditRole
  #   external_id: optional-external-id   # omit if not required
  #   session_duration: 3600              # seconds, default 3600

  # Example: second profile
  # - id: "444455556666"
  #   name: dev
  #   region: ap-south-1
  #   profile: dev-profile
