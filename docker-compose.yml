version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: security_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: secadmin
      POSTGRES_PASSWORD: changeme          # change this
      POSTGRES_DB: cloud_security
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # auto-runs on first start

volumes:
  pgdata:
